<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Clone</title>
    <style>
        :root {
            --pinterest-red: #e60023;
            --pinterest-gray: #efefef;
            --pinterest-dark-gray: #767676;
            --pinterest-black: #111111;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: white;
            color: var(--pinterest-black);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .logo {
            color: var(--pinterest-red);
            font-weight: bold;
            font-size: 24px;
            margin-right: 20px;
            cursor: pointer;
        }

        .search-bar {
            flex-grow: 1;
            background-color: var(--pinterest-gray);
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            max-width: 800px;
            margin: 0 15px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-weight: 500;
            cursor: pointer;
        }

        .profile-icon {
            width: 30px;
            height: 30px;
            background-color: var(--pinterest-gray);
            border-radius: 50%;
            margin-left: 20px;
            cursor: pointer;
        }

        /* Main Grid */
        .container {
            margin-top: 80px;
            padding: 0 20px;
        }

        .pin-grid {
            column-count: 5;
            column-gap: 16px;
            width: 100%;
        }

        @media (max-width: 1200px) { .pin-grid { column-count: 4; } }
        @media (max-width: 900px) { .pin-grid { column-count: 3; } }
        @media (max-width: 600px) { .pin-grid { column-count: 2; } }

        .pin {
            display: inline-block;
            width: 100%;
            margin-bottom: 16px;
            position: relative;
            cursor: zoom-in;
            border-radius: 16px;
            overflow: hidden;
        }

        .pin img, .pin video {
            width: 100%;
            display: block;
            border-radius: 16px;
            transition: filter 0.3s ease;
        }

        .pin:hover img {
            filter: brightness(0.8);
        }

        .pin-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            color: white;
        }

        .pin:hover .pin-overlay {
            opacity: 1;
        }

        .save-btn {
            background-color: var(--pinterest-red);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
        }

        .save-btn:hover {
            background-color: #ad081b;
        }

        .pin-bottom-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Pinterest</div>
        <input type="text" class="search-bar" placeholder="Search for ideas...">
        <div class="nav-links">
            <span>Home</span>
            <span>Explore</span>
            <span>Create</span>
        </div>
        <div class="profile-icon"></div>
    </header>

    <div class="container">
        <div class="pin-grid" id="pinGrid">
            <!-- Pins injected by JS -->
        </div>
    </div>

    <script>
        const grid = document.getElementById('pinGrid');
        const colors = ['#FFB6C1', '#ADD8E6', '#90EE90', '#FFD700', '#FFA07A', '#E6E6FA', '#F08080'];
        
        // Create dummy pins
        for (let i = 0; i < 30; i++) {
            const height = Math.floor(Math.random() * (400 - 200 + 1)) + 200;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const isVideo = Math.random() > 0.8;

            const pin = document.createElement('div');
            pin.className = 'pin';
            
            let mediaHtml = isVideo 
                ? `<video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop autoplay></video>` 
                : `<img src="https://picsum.photos/seed/${i + 100}/400/${height}" alt="Pin">`;

            pin.innerHTML = `
                ${mediaHtml}
                <div class="pin-overlay">
                    <button class="save-btn">Save</button>
                    <div class="pin-bottom-actions">
                        <button class="action-btn">↗️</button>
                        <button class="action-btn">...</button>
                    </div>
                </div>
            `;
            grid.appendChild(pin);
        }
    </script>
</body>
</html>
